name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy pytest pytest-asyncio httpx aiosqlite

      - name: Run isort
        run: |
          isort --check-only --diff app/ tests/
        continue-on-error: false

      - name: Run black
        run: |
          black --check --diff app/ tests/
        continue-on-error: false

      - name: Run flake8
        run: |
          flake8 app/ tests/
        continue-on-error: false

      - name: Run mypy
        run: |
          mypy app/ tests/
        continue-on-error: false

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: false
