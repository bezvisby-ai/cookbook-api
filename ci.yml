stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
  policy: pull-push

lint:isort:
  stage: lint
  image: python:3.11
  before_script:
    - pip install isort
  script:
    - isort --check-only --diff app/ tests/
  allow_failure: false

lint:black:
  stage: lint
  image: python:3.11
  before_script:
    - pip install black
  script:
    - black --check --diff app/ tests/
  allow_failure: false

lint:flake8:
  stage: lint
  image: python:3.11
  before_script:
    - pip install flake8
  script:
    - flake8 app/ tests/
  allow_failure: false

lint:mypy:
  stage: lint
  image: python:3.11
  before_script:
    - pip install mypy
  script:
    - mypy app/ tests/
  allow_failure: false

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest tests/ -v --tb=short
  allow_failure: false
